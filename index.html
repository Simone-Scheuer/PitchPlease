<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Real-time pitch detection and ear training app">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PitchPlease</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tuner.css">
  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/session.css">
  <link rel="stylesheet" href="css/practice.css">
  <link rel="stylesheet" href="css/journal.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Tuner View -->
    <div class="view" id="tuner-view">
      <div class="tuner">

        <div class="tuner__header">
          <span class="tuner__title">PitchPlease</span>
        </div>

        <div class="tuner__note-area">
          <div class="tuner__note-name idle" id="note-name">--<span class="octave"></span></div>
        </div>

        <div class="tuner__needle-wrap">
          <canvas class="tuner__needle-canvas" id="tuner-needle"></canvas>
        </div>

        <div class="tuner__cents" id="tuner-cents">&nbsp;</div>
        <div class="tuner__frequency" id="tuner-frequency">&nbsp;</div>

        <div class="tuner__controls">
          <button class="mic-btn" id="mic-btn" aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
              <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <div class="tuner__hint" id="mic-hint">Tap to start</div>
        </div>

      </div>
    </div>

    <!-- Graph View -->
    <div class="view" id="graph-view">
      <div class="graph">

        <div class="graph__canvas-wrap">
          <canvas class="graph__canvas" id="graph-canvas"></canvas>
        </div>

        <div class="graph__controls">
          <div class="graph__controls-group">
            <button class="graph__btn" id="graph-mic-btn" aria-label="Start/Stop recording">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
            <button class="graph__btn" id="graph-speed-btn" aria-label="Scroll speed">1x</button>
            <button class="graph__btn" id="graph-compact-btn" aria-label="Toggle compact mode" title="Compact: skip gaps">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/>
              </svg>
            </button>
          </div>

          <div class="graph__current-note" id="graph-current-note">--</div>

          <div class="graph__controls-group">
            <select class="graph__select" id="scale-root" aria-label="Scale root"></select>
            <select class="graph__select" id="scale-type" aria-label="Scale type"></select>
          </div>
        </div>

      </div>
    </div>

    <!-- Practice View (Session Launcher) -->
    <div id="practice-view" class="view active">
      <div class="practice-scroll">
        <div class="practice-section practice-today">
          <div class="practice-today-wrap">
            <button class="practice-today-btn" id="practice-start-today">
              <span class="practice-today-title">Today's Practice</span>
              <span class="practice-today-sub">Generating...</span>
              <span class="practice-today-exercises"></span>
            </button>
            <button class="practice-shuffle-btn" id="practice-shuffle" aria-label="Shuffle session">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                <path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="practice-section">
          <h3 class="practice-section-title">Sessions</h3>
          <p class="practice-section-desc">Guided practice routines with multiple exercises</p>
          <div class="practice-templates" id="practice-templates"></div>
        </div>

        <div class="practice-section">
          <h3 class="practice-section-title">Quick Start</h3>
          <p class="practice-section-desc">Jump into a single exercise</p>
          <div class="practice-quick-start" id="practice-quick-start">
            <div class="practice-select-row">
              <label>Root</label>
              <select id="practice-root"></select>
            </div>
            <div class="practice-select-row">
              <label>Scale</label>
              <select id="practice-scale"></select>
            </div>
            <div class="practice-select-row">
              <label>Octave Range</label>
              <div class="practice-octave-range">
                <select id="practice-octave-low"></select>
                <span class="practice-octave-dash">to</span>
                <select id="practice-octave-high"></select>
              </div>
            </div>
            <button class="practice-go-btn" id="practice-quick-go">Start Exercise</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Journal View -->
    <div id="journal-view" class="view" hidden>
      <div class="journal-scroll">
        <div class="journal-section journal-stats">
          <div class="journal-streak" id="journal-streak"></div>
          <div class="journal-week-stats" id="journal-week-stats"></div>
        </div>

        <div class="journal-section journal-skills">
          <h3 class="journal-section-title">Skills</h3>
          <canvas id="journal-radar" width="200" height="200"></canvas>
        </div>

        <div class="journal-section journal-encouragement" id="journal-encouragement"></div>

        <div class="journal-section journal-history">
          <h3 class="journal-section-title">Recent Sessions</h3>
          <div id="journal-sessions"></div>
        </div>
      </div>
    </div>

    <!-- Play View (Legacy Library — kept for now) -->
    <div class="view" id="play-view" hidden>
      <div class="library">
        <div class="library__header">
          <div class="library__tabs">
            <button class="library__tab active" data-tab="practice">Practice</button>
            <button class="library__tab" data-tab="songs">Songs</button>
          </div>
        </div>

        <!-- Practice Configurator -->
        <div class="library__panel" id="practice-panel">
          <div class="practice">
            <div class="practice__row">
              <label class="practice__label">Scale</label>
              <div class="practice__controls-row">
                <select class="practice__select" id="library-practice-root" aria-label="Root note"></select>
                <select class="practice__select practice__select--wide" id="library-practice-scale" aria-label="Scale type"></select>
              </div>
            </div>

            <div class="practice__row">
              <label class="practice__label">Octave Range</label>
              <div class="practice__controls-row">
                <select class="practice__select" id="library-octave-low" aria-label="Low octave"></select>
                <span class="practice__separator">to</span>
                <select class="practice__select" id="library-octave-high" aria-label="High octave"></select>
              </div>
            </div>

            <div class="practice__row">
              <label class="practice__label">Note Duration</label>
              <select class="practice__select practice__select--wide" id="practice-duration" aria-label="Note duration"></select>
            </div>

            <div class="practice__row">
              <label class="practice__label">Pattern</label>
              <select class="practice__select practice__select--wide" id="practice-pattern" aria-label="Pattern"></select>
            </div>

            <div class="practice__row">
              <label class="practice__label">Loop Gap</label>
              <select class="practice__select practice__select--wide" id="practice-loop-gap" aria-label="Gap between loops"></select>
            </div>

            <button class="practice__start-btn" id="practice-start-btn">Start Practice</button>
          </div>
        </div>

        <!-- Song List -->
        <div class="library__panel hidden" id="song-list"></div>
      </div>
    </div>

    <!-- Session View -->
    <div id="session-view" class="view" hidden>
      <div class="session-header">
        <div class="session-progress"></div>
        <div class="session-label"></div>
      </div>
      <canvas id="session-canvas"></canvas>
      <div class="session-transition" hidden>
        <div class="session-transition-text"></div>
      </div>
      <div class="session-controls">
        <button class="session-btn session-btn-pause" id="session-pause">
          <span class="session-btn-icon">&#x23F8;</span>
          <span class="session-btn-text">Pause</span>
        </button>
        <button class="session-btn session-btn-skip" id="session-skip">
          <span class="session-btn-icon">&#x23ED;</span>
          <span class="session-btn-text">Skip</span>
        </button>
        <button class="session-btn session-btn-end" id="session-end">End Session</button>
      </div>
      <div class="session-summary" hidden>
        <div class="session-summary-icon">&#10003;</div>
        <h2 class="session-summary-title">Nice Work!</h2>
        <div class="session-summary-time"></div>
        <div class="session-summary-exercises"></div>
        <div class="session-summary-message"></div>
        <button class="session-btn session-btn-primary" id="session-back">Back to Practice</button>
      </div>
    </div>

    <!-- Game View -->
    <div class="view" id="game-view">
      <div class="game">

        <div class="game__topbar">
          <div class="game__song-title" id="game-song-title">--</div>
          <div class="game__live-score" id="game-live-score">0</div>
        </div>

        <div class="game__canvas-wrap">
          <canvas class="game__canvas" id="game-canvas"></canvas>
          <div class="game__countdown" id="game-countdown"></div>
          <div class="game__loop-score" id="game-loop-score"></div>
        </div>

        <div class="game__controls">
          <div class="game__controls-group">
            <button class="game__btn" id="game-play-btn" aria-label="Play/Stop">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button class="game__btn" id="game-pause-btn" aria-label="Pause/Resume">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </button>
            <button class="game__btn" id="game-restart-btn" aria-label="Restart">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
              </svg>
            </button>
            <button class="game__btn" id="game-loop-btn" aria-label="Toggle loop mode" title="Loop mode">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
              </svg>
            </button>
            <button class="game__btn" id="game-tempo-btn" aria-label="Tempo">1x</button>
          </div>
          <div class="game__controls-group">
            <select class="game__select" id="game-difficulty" aria-label="Difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>

        <!-- Results overlay -->
        <div class="results-overlay" id="results-overlay">
          <div class="results__score">0</div>
          <div class="results__label">--</div>
          <div class="results__notes"></div>
          <div class="results__actions">
            <button class="results__btn results__btn--secondary" id="results-back-btn">Back</button>
            <button class="results__btn results__btn--primary" id="results-retry-btn">Retry</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- View Switcher -->
  <nav class="view-switcher" id="view-switcher">
    <button class="view-switcher__tab" data-view="tuner-view" aria-label="Tuner">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
      Tuner
    </button>
    <button class="view-switcher__tab" data-view="graph-view" aria-label="Graph">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
      </svg>
      Graph
    </button>
    <button class="view-switcher__tab" data-view="journal-view" aria-label="Journal">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
      </svg>
      Journal
    </button>
    <button class="view-switcher__tab active" data-view="play-view" aria-label="Practice">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
      Practice
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
