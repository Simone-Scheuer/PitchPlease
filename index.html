<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="Real-time pitch detection and ear training app">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PitchPlease</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tuner.css">
  <link rel="stylesheet" href="css/graph.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Tuner View -->
    <div class="view active" id="tuner-view">
      <div class="tuner">

        <div class="tuner__header">
          <span class="tuner__title">PitchPlease</span>
        </div>

        <div class="tuner__note-area">
          <div class="tuner__note-name idle" id="note-name">--<span class="octave"></span></div>
        </div>

        <div class="tuner__needle-wrap">
          <canvas class="tuner__needle-canvas" id="tuner-needle"></canvas>
        </div>

        <div class="tuner__cents" id="tuner-cents">&nbsp;</div>
        <div class="tuner__frequency" id="tuner-frequency">&nbsp;</div>

        <div class="tuner__controls">
          <button class="mic-btn" id="mic-btn" aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
              <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <div class="tuner__hint" id="mic-hint">Tap to start</div>
        </div>

      </div>
    </div>

    <!-- Graph View -->
    <div class="view" id="graph-view">
      <div class="graph">

        <div class="graph__canvas-wrap">
          <canvas class="graph__canvas" id="graph-canvas"></canvas>
        </div>

        <div class="graph__controls">
          <div class="graph__controls-group">
            <button class="graph__btn" id="graph-mic-btn" aria-label="Toggle microphone">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
            <button class="graph__btn" id="graph-pause-btn" aria-label="Pause/Resume">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </button>
            <button class="graph__btn" id="graph-speed-btn" aria-label="Scroll speed">1x</button>
          </div>

          <div class="graph__current-note" id="graph-current-note">--</div>

          <div class="graph__controls-group">
            <select class="graph__select" id="scale-root" aria-label="Scale root"></select>
            <select class="graph__select" id="scale-type" aria-label="Scale type"></select>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- View Switcher -->
  <nav class="view-switcher" id="view-switcher">
    <button class="view-switcher__tab active" data-view="tuner-view" aria-label="Tuner">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
      Tuner
    </button>
    <button class="view-switcher__tab" data-view="graph-view" aria-label="Graph">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
      </svg>
      Graph
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
