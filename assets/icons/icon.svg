<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0d0d0d"/>
  <!-- Tuning fork -->
  <g transform="translate(256,256)" stroke="#4ecdc4" stroke-width="20" stroke-linecap="round" fill="none">
    <!-- Left prong -->
    <path d="M-40,-160 L-40,-40 Q-40,0 0,0"/>
    <!-- Right prong -->
    <path d="M40,-160 L40,-40 Q40,0 0,0"/>
    <!-- Handle -->
    <line x1="0" y1="0" x2="0" y2="160"/>
    <!-- Base ball -->
    <circle cx="0" cy="170" r="14" fill="#4ecdc4" stroke="none"/>
  </g>
  <!-- Sound waves -->
  <g transform="translate(256,130)" stroke="#4ecdc4" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M-80,-30 Q-80,-60 -80,-80" />
    <path d="M80,-30 Q80,-60 80,-80" />
  </g>
</svg>
